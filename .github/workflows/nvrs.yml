name: Release version

on:
  repository_dispatch:
  workflow_dispatch:
  schedule:
    - cron: "00 18 * * *"

jobs:
  linkChecker:
    runs-on: ubuntu-latest
    permissions:
      issues: write # required for peter-evans/create-issue-from-file
    steps:
      - name: install nvrs
        run: |
          wget - O ${{ runner.temp }}/nvrs.tar.gz https://github.com/adamperkowski/nvrs/releases/download/v0.1.6/nvrs-v0.1.6.tar.gz \ 
          && tar -xzf ${{ runner.temp }}/nvrs.tar.gz \
          && chmod +x nvrs \
          && mv nvrs /usr/local/bin/
      -name: nvrs

      - name: Create Issue From File
        if: steps.lychee.outputs.exit_code != 0
        uses: peter-evans/create-issue-from-file@v5
        with:
          title: Link Checker Report
          content-filepath: ./lychee/out.md
          labels: report, automated issue
